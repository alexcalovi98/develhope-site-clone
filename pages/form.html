<!DOCTYPE html>
<html>
    <head>
        <style>
            input {
                border-radius: 4px;
            }

            input::placeholder {
                color: #283681;
            }

            input[type=button] {
                background-color: #283681;
                color: white;
                padding: 8px;
            }

            input[type=button]:hover {
                background-color: white;
                color: #283681;
                cursor: pointer;
            }

            input[type=text]:disabled {
                background-color: #283681;
                color: white;
            }
        </style>
    </head>
    <body>
        <div>
            <img src="../images/develhope.png" alt="Logo di Develhope" width="400">
        </div>
        <h1>Iscriviti al corso Develhope</h1>
        <form>
            <label for="nome">Inserisci nome</label>
            <input id="nome" name="nome" type="text" placeholder="Nome" value="Alex" disabled>
            <br><br>
            <label for="cognome">Inserisci cognome</label>
            <input id="cognome" name="cognome" type="text" placeholder="Cognome">
            <br><br>
            <label for="nascita">Inserisci data di nascita</label>
            <input id="nascita" name="nascita" type="date">
            <br><br>
            <label for="mail">Inserisci indirizzo mail</label>
            <input id="mail" name="mail" type="email" placeholder="Mail">
            <br><br>
            <label for="password">Inserisci una password</label>
            <input id="password" name="password" type="password" placeholder="Password">
            <br><br>
            <label for="presentazione">Presentazione</label><br>
            <textarea id="presentazione" name="presentazione" placeholder="Presentati (max 1000 caratteri)" rows="10" cols="50" maxlength="1000">Scrivi qua la tua presentazione per essere accettato nel corso</textarea>
            <br><br>
            <input id="maggiorenne" name="maggiorenne" type="checkbox">
            <label for="maggiorenne">Dichiaro di avere almeno 16 anni e poter partecipare ai corsi Develhope</label>
            <br><br>
            <input type="button" value="Invia richiesta">
        </form>
    </body>
</html>
